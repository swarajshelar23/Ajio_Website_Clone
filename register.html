<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - ShopAjio</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Create an Account</h2>
    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required class="w-full border border-gray-300 rounded px-4 py-2 mb-4"/>
      <input type="email" id="email" placeholder="Email" required class="w-full border border-gray-300 rounded px-4 py-2 mb-4"/>
      <input type="password" id="password" placeholder="Password" required class="w-full border border-gray-300 rounded px-4 py-2 mb-4"/>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Register</button>
    </form>
    <p class="text-center text-sm text-gray-600 mt-4">
      Already have an account? <a href="login.html" class="text-blue-500 hover:underline">Login</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Simple localStorage auth simulation
      localStorage.setItem('user', JSON.stringify({ name, email, password }));
      alert('Registration successful!');
      window.location.href = 'onlineshop.html';
    });
  </script>
</body>
</html>
