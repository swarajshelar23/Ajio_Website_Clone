<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - ShopAjio</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Login to Your Account</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required class="w-full border border-gray-300 rounded px-4 py-2 mb-4"/>
      <input type="password" id="password" placeholder="Password" required class="w-full border border-gray-300 rounded px-4 py-2 mb-4"/>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">Login</button>
    </form>
    <p class="text-center text-sm text-gray-600 mt-4">
      New user? <a href="register.html" class="text-blue-500 hover:underline">Register</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const storedUser = JSON.parse(localStorage.getItem('user'));
      if (storedUser && storedUser.email === email && storedUser.password === password) {
        alert('Login successful!');
        window.location.href = 'onlineshop.html';
      } else {
        alert('Invalid credentials.');
      }
    });
  </script>
</body>
</html>
