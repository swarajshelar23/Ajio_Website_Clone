<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-4">
      <a href="onlineshop.html">
        <img src="https://assets.ajio.com/static/img/Ajio-Logo.svg" alt="Ajio Logo" class="h-8">
      </a>
      <h1 class="text-lg font-semibold text-gray-700">Shopping Cart</h1>
      <a href="onlineshop.html" class="text-blue-500 hover:underline">Continue Shopping</a>
    </div>
  </header>

  <!-- Cart Section -->
  <main class="max-w-7xl mx-auto p-6">
    <h2 class="text-2xl font-bold mb-4">Your Cart</h2>
    <div id="cart-items" class="bg-white p-4 rounded shadow">
      <!-- Cart items will be dynamically injected here -->
    </div>
    <div class="mt-4 flex justify-between items-center">
      <p id="total-price" class="text-lg font-semibold">Total: ₹0</p>
      <button id="checkout-button" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Checkout</button>
    </div>
  </main>

  <script>
    const cart = JSON.parse(localStorage.getItem('cart')) || [];

    const renderCart = () => {
      const cartItemsContainer = document.getElementById('cart-items');
      const totalPriceElement = document.getElementById('total-price');
      cartItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
        totalPriceElement.textContent = 'Total: ₹0';
        return;
      }

      let total = 0;

      cart.forEach((item, index) => {
        total += item.price;

        const cartItem = document.createElement('div');
        cartItem.className = 'flex justify-between items-center border-b py-2';

        cartItem.innerHTML = `
          <div class="flex items-center space-x-4">
            <img src="${item.image}" alt="${item.name}" class="w-16 h-16 object-cover rounded">
            <div>
              <h3 class="text-lg font-semibold">${item.name}</h3>
              <p class="text-gray-600">₹${item.price}</p>
            </div>
          </div>
          <button class="text-red-500 hover:underline remove-item" data-index="${index}">Remove</button>
        `;

        cartItemsContainer.appendChild(cartItem);
      });

      totalPriceElement.textContent = `Total: ₹${total}`;
    };

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('remove-item')) {
        const index = parseInt(e.target.dataset.index);
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      }
    });
    document.getElementById('checkout-button').addEventListener('click', () => {
  const billContainer = document.getElementById('bill');
  billContainer.innerHTML = '';

  if (cart.length === 0) {
    billContainer.innerHTML = '<p class="text-red-500 font-semibold">Cart is empty. Please add items before checkout.</p>';
    return;
  }

  let total = 0;
  let billHTML = `
    <h3 class="text-xl font-bold mb-2">Bill Summary</h3>
    <ul class="mb-4 space-y-1">
  `;

  cart.forEach((item) => {
    billHTML += `<li class="flex justify-between text-gray-700"><span>${item.name}</span><span>₹${item.price}</span></li>`;
    total += item.price;
  });

  billHTML += `</ul>
    <div class="flex justify-between font-semibold border-t pt-2">
      <span>Total</span><span>₹${total}</span>
    </div>
    <p class="mt-4 text-green-600 font-medium">Thank you for shopping with us!</p>
  `;

  billContainer.innerHTML = billHTML;
});


    renderCart();
</script>
<!-- Bill summary will appear here -->
<div id="bill" class="bg-white p-4 mt-6 rounded shadow"></div>

</body>
</html>
